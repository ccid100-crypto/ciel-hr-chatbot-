<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>씨엘모빌리티 AI챗봇</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --navy-900: #0F1D2F;
      --navy-800: #1A2D45;
      --blue-600: #2563EB;
      --blue-500: #3B82F6;
      --blue-100: #DBEAFE;
      --blue-50:  #EFF6FF;
      --teal-600: #0D9488;
      --teal-500: #14B8A6;
      --teal-100: #CCFBF1;
      --gray-800: #1E293B;
      --gray-700: #334155;
      --gray-600: #475569;
      --gray-500: #64748B;
      --gray-400: #94A3B8;
      --gray-300: #CBD5E1;
      --gray-200: #E2E8F0;
      --gray-100: #F1F5F9;
      --gray-50:  #F8FAFC;
      --white: #FFFFFF;
      --shadow-sm: 0 1px 3px rgba(15,29,47,0.08);
      --shadow-md: 0 4px 12px rgba(15,29,47,0.08);
      --shadow-lg: 0 8px 30px rgba(15,29,47,0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--gray-50);
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: var(--gray-800);
      overflow: hidden;
    }

    .chat-container {
      width: 100%;
      height: 100vh;
      background: var(--white);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: var(--navy-900);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .chat-header::after {
      content: '';
      position: absolute;
      top: -60%; right: -10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(37,99,235,0.18), transparent 70%);
      pointer-events: none;
    }
    .header-left { display: flex; align-items: center; gap: 12px; z-index: 1; }
    .header-logo { height: 32px; width: auto; object-fit: contain; }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
    .header-title { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; }
    .header-badge {
      background: rgba(20,184,166,0.2); color: var(--teal-500);
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; margin-left: 4px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; z-index: 1; }
    .doc-info { font-size: 12px; color: var(--gray-400); display: flex; align-items: center; gap: 5px; }
    .doc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-500); }
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.8);
      padding: 5px 14px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500;
      transition: all 0.2s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); color: var(--white); }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 32px calc(50% - 720px) 8px;
      display: flex; flex-direction: column; gap: 16px;
      background: var(--gray-50);
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

    .message-row { display: flex; gap: 10px; align-items: flex-start; }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin-top: 2px;
    }
    .avatar.ai { background: linear-gradient(135deg, var(--blue-600), var(--teal-600)); color: var(--white); }
    .avatar.user-av { background: var(--gray-200); color: var(--gray-600); }

    .bubble {
      max-width: 76%;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.7;
      box-shadow: var(--shadow-sm);
    }
    .bubble.user {
      background: var(--navy-900); color: var(--white);
      border-bottom-right-radius: 4px;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble.assistant {
      background: var(--white); color: var(--gray-800);
      border: 1px solid var(--gray-200);
      border-bottom-left-radius: 4px;
    }
    .bubble.loading {
      background: var(--white); color: var(--gray-400);
      border: 1px solid var(--gray-200);
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    /* Markdown 스타일 */
    .bubble.assistant h1, .bubble.assistant h2, .bubble.assistant h3 {
      color: var(--navy-900); font-weight: 700;
      margin: 16px 0 8px; line-height: 1.4;
    }
    .bubble.assistant h1 { font-size: 17px; }
    .bubble.assistant h2 { font-size: 15px; padding-bottom: 6px; border-bottom: 1px solid var(--gray-200); }
    .bubble.assistant h3 { font-size: 14px; color: var(--gray-700); }
    .bubble.assistant p { margin: 8px 0; }
    .bubble.assistant p:first-child { margin-top: 0; }
    .bubble.assistant p:last-child { margin-bottom: 0; }
    .bubble.assistant ul, .bubble.assistant ol {
      margin: 8px 0; padding-left: 20px; display: flex; flex-direction: column; gap: 4px;
    }
    .bubble.assistant li { line-height: 1.65; }
    .bubble.assistant li::marker { color: var(--blue-600); }
    .bubble.assistant strong { font-weight: 700; color: var(--navy-900); }
    .bubble.assistant em { color: var(--gray-600); }
    .bubble.assistant code {
      background: var(--gray-100); color: var(--blue-600);
      padding: 1px 6px; border-radius: 4px;
      font-size: 13px; font-family: 'Consolas', monospace;
    }
    .bubble.assistant pre {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 12px 14px;
      margin: 10px 0; overflow-x: auto;
    }
    .bubble.assistant pre code {
      background: none; padding: 0; color: var(--gray-800); font-size: 13px;
    }
    .bubble.assistant blockquote {
      border-left: 3px solid var(--blue-600);
      padding: 8px 14px; margin: 10px 0;
      background: var(--blue-50); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--gray-700);
    }
    .bubble.assistant table {
      width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px;
    }
    .bubble.assistant th {
      background: var(--gray-100); color: var(--gray-700); font-weight: 600;
      padding: 8px 12px; border: 1px solid var(--gray-200); text-align: left;
    }
    .bubble.assistant td {
      padding: 8px 12px; border: 1px solid var(--gray-200); color: var(--gray-700);
    }
    .bubble.assistant tr:nth-child(even) td { background: var(--gray-50); }
    .bubble.assistant hr {
      border: none; border-top: 1px solid var(--gray-200); margin: 12px 0;
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--white); color: var(--gray-500);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md); border-bottom-left-radius: 4px;
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-sm);
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue-500);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* 커서 깜빡임 */
    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--blue-600); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Welcome */
    .welcome { text-align: center; padding: 32px 0 8px; }
    .welcome-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--blue-600), var(--teal-600));
      border-radius: var(--radius-md); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .welcome h2 { font-size: 18px; font-weight: 700; color: var(--navy-900); margin-bottom: 6px; }
    .welcome p { font-size: 13px; color: var(--gray-500); line-height: 1.6; }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .chip {
      background: var(--white); border: 1px solid var(--gray-200);
      color: var(--gray-700); padding: 7px 14px;
      border-radius: var(--radius-sm); font-size: 13px;
      font-family: inherit; cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .chip:hover { border-color: var(--blue-600); color: var(--blue-600); background: var(--blue-50); }

    /* Input */
    .input-area {
      padding: 16px calc(50% - 720px) 20px;
      background: var(--white);
      border-top: 1px solid var(--gray-200); flex-shrink: 0;
    }
    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--gray-50); border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-md); padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--blue-600);
      box-shadow: 0 0 0 3px var(--blue-100);
      background: var(--white);
    }
    textarea {
      flex: 1; resize: none; border: none; background: transparent;
      font-size: 14px; font-family: inherit; color: var(--gray-800);
      outline: none; max-height: 120px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--gray-400); }
    .send-btn {
      background: var(--navy-900); color: var(--white); border: none;
      border-radius: var(--radius-sm); width: 36px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, background 0.2s;
    }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { background: var(--navy-800); }
    .input-hint { font-size: 11px; color: var(--gray-400); margin-top: 8px; text-align: center; }

    /* 반응형 */
    @media (max-width: 1600px) {
      .messages { padding-left: 80px; padding-right: 80px; }
      .input-area { padding-left: 80px; padding-right: 80px; }
    }
    @media (max-width: 1200px) {
      .messages { padding-left: 48px; padding-right: 48px; }
      .input-area { padding-left: 48px; padding-right: 48px; }
    }
    @media (max-width: 900px) {
      .messages { padding-left: 24px; padding-right: 24px; }
      .input-area { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 768px) {
      .chat-header { padding: 0 16px; height: 56px; }
      .header-logo { height: 26px; }
      .header-title { font-size: 14px; }
      .header-badge { display: none; }
      .doc-info { display: none !important; }
      .messages { padding: 16px 16px 8px; gap: 12px; }
      .input-area { padding: 12px 16px 16px; }
      .bubble { max-width: 88%; font-size: 14px; padding: 10px 14px; }
      .welcome h2 { font-size: 16px; }
      .suggestion-chips { gap: 6px; }
      .chip { font-size: 12px; padding: 6px 11px; }
    }
    @media (max-width: 480px) {
      .bubble { max-width: 94%; }
      .reset-btn span { display: none; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-left">
        <img src="/static/logo.png" alt="씨엘모빌리티" class="header-logo" />
        <div class="header-divider"></div>
        <span class="header-title">HR AI 챗봇</span>
        <span class="header-badge">AI</span>
      </div>
      <div class="header-right">
        <div class="doc-info" id="docInfo" style="display:none;">
          <div class="doc-dot"></div>
          <span id="docCount"></span>
        </div>
        <button class="reset-btn" onclick="resetChat()">대화 초기화</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>씨엘모빌리티 HR AI챗봇</h2>
        <p>인사, 복리후생, 휴가, 규정 등<br>HR 관련 궁금한 점을 질문해보세요.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="fillInput('연차 신청 방법이 어떻게 되나요?')">연차 신청 방법</button>
          <button class="chip" onclick="fillInput('복리후생 제도에 대해 알려주세요.')">복리후생 안내</button>
          <button class="chip" onclick="fillInput('경조사 휴가 규정이 어떻게 되나요?')">경조사 휴가</button>
          <button class="chip" onclick="fillInput('급여 지급일이 언제인가요?')">급여 지급일</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="HR 관련 질문을 입력하세요..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
    </div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const messagesEl = document.getElementById("messages");

    // HR 문서 상태
    (async () => {
      try {
        const res = await fetch("/hr-docs");
        const data = await res.json();
        if (data.files && data.files.length > 0) {
          document.getElementById("docInfo").style.display = "flex";
          document.getElementById("docCount").textContent = `HR 문서 ${data.files.length}개 로드됨`;
        }
      } catch (e) {}
    })();

    function fillInput(text) {
      input.value = text;
      input.focus();
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    function removeWelcome() {
      const w = messagesEl.querySelector(".welcome");
      if (w) w.remove();
    }

    function addUserMessage(text) {
      removeWelcome();
      const row = document.createElement("div");
      row.className = "message-row user";
      row.innerHTML = `
        <div class="bubble user">${escapeHtml(text)}</div>
        <div class="avatar user-av">나</div>`;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addTypingIndicator() {
      removeWelcome();
      const row = document.createElement("div");
      row.className = "message-row";
      row.id = "typingRow";
      row.innerHTML = `
        <div class="avatar ai">AI</div>
        <div class="typing-indicator">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
          답변 생성 중...
        </div>`;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function replaceTypingWithBubble() {
      const typingRow = document.getElementById("typingRow");
      if (typingRow) {
        typingRow.innerHTML = `<div class="avatar ai">AI</div><div class="bubble assistant"></div>`;
        typingRow.removeAttribute("id");
      }
      return typingRow ? typingRow.querySelector(".bubble.assistant") : null;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;

      addUserMessage(text);
      addTypingIndicator();

      let rawText = "";
      let bubble = null;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const json = JSON.parse(line.slice(6));
            if (json.delta) {
              if (!bubble) bubble = replaceTypingWithBubble();
              rawText += json.delta;
              bubble.innerHTML = marked.parse(rawText) + '<span class="cursor"></span>';
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (json.done && bubble) {
              bubble.innerHTML = marked.parse(rawText);
            }
          }
        }
      } catch (err) {
        const typingRow = document.getElementById("typingRow");
        if (typingRow) typingRow.remove();
        if (!bubble) bubble = replaceTypingWithBubble() || (() => {
          const row = document.createElement("div");
          row.className = "message-row";
          row.innerHTML = `<div class="avatar ai">AI</div><div class="bubble assistant"></div>`;
          messagesEl.appendChild(row);
          return row.querySelector(".bubble.assistant");
        })();
        bubble.innerHTML = "서버 연결에 실패했습니다.";
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function resetChat() {
      await fetch("/reset", { method: "POST" });
      messagesEl.innerHTML = `
        <div class="welcome">
          <div class="welcome-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2>씨엘모빌리티 HR AI챗봇</h2>
          <p>인사, 복리후생, 휴가, 규정 등<br>HR 관련 궁금한 점을 질문해보세요.</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="fillInput('연차 신청 방법이 어떻게 되나요?')">연차 신청 방법</button>
            <button class="chip" onclick="fillInput('복리후생 제도에 대해 알려주세요.')">복리후생 안내</button>
            <button class="chip" onclick="fillInput('경조사 휴가 규정이 어떻게 되나요?')">경조사 휴가</button>
            <button class="chip" onclick="fillInput('급여 지급일이 언제인가요?')">급여 지급일</button>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
